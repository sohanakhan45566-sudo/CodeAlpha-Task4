name: Docker Build and Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.PIXELBYSOHANA }}
        password: ${{ secrets.SOHANA78677 }}
    
    - name: Build Docker image
      run: |
        docker build -t pixelbysohana/codealpha-task4:latest .
    
    - name: Push Docker image
      run: |
        docker push pixelbysohana/codealpha-task4:latest

name: Docker Build and Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:latest .
        docker tag ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:latest ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:${{ github.sha }}
    
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:${{ github.sha }}
    
    - name: Deploy to staging
      run: |
        echo "✅ Image built and pushed successfully!"
        echo "📦 Image: ${{ secrets.DOCKER_USERNAME }}/codealpha-task4:latest"
        echo "🚀 Deployment simulation complete!"
